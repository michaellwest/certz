version: "3.8"

# All services depend on a debug build. Run once before starting any service:
#   pwsh -File build-debug.ps1
#
# Windows services use: debug/win-x64/
# Linux services use:   debug/linux-x64/
#
# Run a service:
#   docker-compose -f docker-compose.test.yml up --build <service>
#
# Available services:
#   certz-test-smoke     - Nanoserver smoke tests (Windows)
#   certz-test           - Full test suite, Server Core (Windows)
#   certz-test-dev       - Dev mode with volume mounts, Server Core (Windows)
#   certz-linux-test     - Full test suite, Ubuntu 22.04 (Linux)
#   certz-linux-test-dev - Dev mode with volume mounts, Ubuntu 22.04 (Linux)

services:
  # Nanoserver smoke tests - validates certz.exe runs on minimal Windows
  certz-test-smoke:
    build:
      context: .
      dockerfile: Dockerfile.test.nanoserver
    image: certz-test-smoke:latest
    container_name: certz-test-smoke
    isolation: process

  # Full test suite on Server Core (PKI module, certutil, Cert:\ drive available)
  certz-test:
    build:
      context: .
      dockerfile: Dockerfile.test.servercore
    image: certz-test:latest
    container_name: certz-test
    environment:
      - DOTNET_ENVIRONMENT=Test
    volumes:
      - .\test\test-results:C:\app\test\test-results
    isolation: process

  # Development test runner with volume mounts (no rebuild needed for changes)
  certz-test-dev:
    build:
      context: .
      dockerfile: Dockerfile.test.servercore
    image: certz-test:latest
    container_name: certz-test-dev
    environment:
      - DOTNET_ENVIRONMENT=Test
    volumes:
      - ./debug/win-x64/certz.exe:C:\app\certz.exe:ro
      - ./debug/win-x64/certz.pdb:C:\app\certz.pdb:ro
      - ./test:C:\app\test:ro
      - .\test\test-results:C:\app\test\test-results
    isolation: process

  # Linux full test suite - validates certz linux-x64 build on Ubuntu 22.04
  certz-linux-test:
    build:
      context: .
      dockerfile: Dockerfile.test.linux
    image: certz-linux-test:latest
    container_name: certz-linux-test
    environment:
      - DOTNET_ENVIRONMENT=Test
    volumes:
      - ./test/test-results:/app/test/test-results

  # Linux development test runner with volume mounts (no rebuild needed for binary/test changes)
  certz-linux-test-dev:
    build:
      context: .
      dockerfile: Dockerfile.test.linux
    image: certz-linux-test:latest
    container_name: certz-linux-test-dev
    environment:
      - DOTNET_ENVIRONMENT=Test
    volumes:
      - ./debug/linux-x64/certz:/app/certz:ro
      - ./test:/app/test:ro
      - ./test/test-results:/app/test/test-results
